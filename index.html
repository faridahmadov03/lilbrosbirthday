<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #ffe4e9;
            --accent-red: #ff4d6d;
            --text-color: #590d22;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-pink);
            background-image: radial-gradient(#ffb3c1 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            cursor: pointer;
        }

        .gift-box {
            font-size: 80px;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: inline-block;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hint {
            color: var(--accent-red);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 14px;
        }

        #content {
            display: none;
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 50px rgba(255, 77, 109, 0.2);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { color: var(--accent-red); margin-bottom: 10px; }
        p { color: var(--text-color); line-height: 1.6; font-size: 18px; }

        .qr-placeholder {
            margin-top: 25px;
            border: 2px dashed #ffb3c1;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
        }

        .qr-placeholder img {
            max-width: 150px;
            display: block;
        }

        .qr-text {
            font-size: 10px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="trigger" class="container" onclick="revealSurprise()">
        <div class="gift-box">🎁</div>
        <div class="hint">Click for Surprise</div>
    </div>

    <div id="content">
        <h1>Happy Birthday! 🎈</h1>
        
        <p id="birthday-text">
            Happy Birthday, prettiest girl itw😘<br>
            Wünsche dir alles Gute. U make me happy🌷
        </p>

        <div class="qr-placeholder">
            <img src="IMG_2537.png" alt="QR Code">
            <div class="qr-text">Scan me</div>
        </div>
    </div>

    <script>
        function revealSurprise() {
            document.getElementById('trigger').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.body.style.backgroundColor = "#fff0f3";
        }
    </script>
</body>
</html>
